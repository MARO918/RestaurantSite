<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Image Site</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

/* 背景 */
body {
    display: flex;
    flex-direction: column;
    background-image: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('./omelet.png');
    background-size: contain;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    position: relative;
}

/* ヘッダー */
nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    margin: 10px;
}

/* メインビジュアル */
.image-area {
    color: rgb(205, 229, 127);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    font-size: larger;
    font-family: Arial, sans-serif;
    padding: 40px;
    background-color: rgba(255, 255, 255, 0.5);
    border-radius: 10px;
    margin: 20px;
    min-height: 60vh;
}

/* ===== Blogセクション ===== */
.blog-section {
    background: white;
    padding: 60px 20px;
}

.blog-title {
    text-align: center;
    font-size: 24px;
    margin-bottom: 40px;
}

/* グリッド */
.blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1000px;
    margin: auto;
}

/* カード */
.blog-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* 画像 */
.blog-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* テキスト */
.blog-content {
    padding: 15px;
}

/* 日付 */
.blog-date {
    font-size: 12px;
    color: gray;
}

/* ===== ズラし（画像のようなレイアウト） ===== */
.blog-card:nth-child(2) {
    margin-top: 40px;
}

.blog-card:nth-child(3) {
    margin-top: 80px;
}

/* フッター */
footer {
    background-color: #dce6ef;
    text-align: center;
    padding: 20px;
    margin-top: auto;
}
</style>
</head>

<body>

<header>

        <a href="about.html">About /</a>
        <a href="services.html">Services /</a>
        <a href="contact.html">Contact</a>

    </nav>
</header>
